<!DOCTYPE html><br/><html lang="ru"><br/><head><br/><meta charset="UTF-8"><br/><meta name="viewport" content="width=device-width, initial-scale=1.0"><br/><title>Ли Ян Бадминтон</title><br/><style><br/>  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}<br/>  body{background:#f5f7fa;padding:20px}<br/>  .container{max-width:1000px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.05);padding:25px}<br/>  .login{max-width:400px;margin:50px auto;padding:25px;border:1px solid #eee;border-radius:10px}<br/>  .login h3{margin-bottom:15px;text-align:center}<br/>  input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:16px}<br/>  button{padding:12px 20px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:16px;margin:5px 0}<br/>  .btn-danger{background:#dc3545}<br/>  .btn-warning{background:#ffc107;color:#000}<br/>  .admin{display:none;margin-bottom:30px}<br/>  .goods{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin-top:20px}<br/>  .item{border:1px solid #eee;border-radius:10px;overflow:hidden}<br/>  .item img{width:100%;height:180px;object-fit:cover}<br/>  .info{padding:15px}<br/>  .name{font-weight:bold;font-size:17px;margin-bottom:5px}<br/>  .price{color:#e53935;font-size:16px;margin-bottom:8px}<br/>  .note{font-size:14px;color:#666;line-height:1.4;margin-bottom:10px}<br/>  .actions{display:flex;gap:5px}<br/>  .actions button{flex:1;font-size:14px;padding:8px}<br/>  .title{margin-bottom:15px}<br/></style><br/></head><br/><body><br/><div class="container"><br/>  <h2 style="text-align:center; margin-bottom:20px">Ли Ян Бадминтон</h2><br/>  <!-- 登录 --><br/>  <div class="login" id="loginBox"><br/>    <h3>Вход для администратора</h3><br/>    <input type="password" id="pwd" placeholder="Пароль"><br/>    <button onclick="login()">Войти</button><br/>  </div><br/>  <!-- 管理面板 --><br/>  <div class="admin" id="adminPanel"><br/>    <h3 class="title">Добавить товар</h3><br/>    <input type="text" id="name" placeholder="Название"><br/>    <input type="text" id="price" placeholder="Цена"><br/>    <input type="text" id="img" placeholder="Ссылка на фото"><br/>    <textarea id="note" rows="3" placeholder="Примечание"></textarea><br/>    <button onclick="addItem()">Добавить товар</button><br/>    <button onclick="logout()" style="background:#666">Выйти</button><br/>  </div><br/>  <!-- 商品列表 --><br/>  <div id="goodsList" class="goods"></div><br/></div><br/><script><br/>const PASSWORD = "Ly52152100";<br/>const DATA_URL = "https://liyang315.github.io/data.json";<br/>const SAVE_URL = "https://api.github.com/repos/liyang315/liyang315.github.io/contents/data.json";<br/>let items = [];<br/>let token = "ghp_Pize7EDxrs8mYm6mC9bgOxyFCC4OUv2B2cDg";<br/><br/>// 页面加载读取数据<br/>window.onload = async () => {<br/>  try {<br/>    let res = await fetch(DATA_URL);<br/>    items = await res.json();<br/>    render();<br/>  } catch(e) { console.error("加载数据失败", e); }<br/>};<br/><br/>// 登录<br/>function login() {<br/>  if (document.getElementById("pwd").value === PASSWORD) {<br/>    document.getElementById("loginBox").style.display = "none";<br/>    document.getElementById("adminPanel").style.display = "block";<br/>  } else {<br/>    alert("Неверный пароль");<br/>  }<br/>}<br/><br/>function logout() {<br/>  document.getElementById("adminPanel").style.display = "none";<br/>  document.getElementById("loginBox").style.display = "block";<br/>}<br/><br/>// 渲染商品<br/>function render() {<br/>  let box = document.getElementById("goodsList");<br/>  box.innerHTML = "";<br/>  items.forEach((it, i) => {<br/>    box.innerHTML += `<br/>      <div class="item"><br/>        < img src="${it.img}" alt="${it.name}"><br/>        <div class="info"><br/>          <div class="name">${it.name}</div><br/>          <div class="price">${it.price}</div><br/>          <div class="note">${it.note || ""}</div><br/>          <div class="actions"><br/>            <button class="btn-warning" onclick="edit(${i})">Изменить</button><br/>            <button class="btn-danger" onclick="del(${i})">Удалить</button><br/>          </div><br/>        </div><br/>      </div><br/>    `;<br/>  });<br/>}<br/><br/>// 保存到 GitHub<br/>async function saveToGitHub() {<br/>  try {<br/>    const shaRes = await fetch(SAVE_URL, { headers: { Authorization: `token ${token}` } });<br/>    const shaData = await shaRes.json();<br/>    const sha = shaData.sha;<br/>    const content = btoa(unescape(encodeURIComponent(JSON.stringify(items, null, 2))));<br/>    const saveRes = await fetch(SAVE_URL, {<br/>      method: "PUT",<br/>      headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },<br/>      body: JSON.stringify({ message: "Update data", content: content, sha: sha })<br/>    });<br/>    saveRes.ok ? alert("Данные сохранены в облако!") : alert("Ошибка сохранения");<br/>  } catch(e) { console.error(e); alert("Ошибка сохранения"); }<br/>}<br/><br/>// 添加商品<br/>function addItem() {<br/>  const name = document.getElementById("name").value;<br/>  const price = document.getElementById("price").value;<br/>  const img = document.getElementById("img").value;<br/>  const note = document.getElementById("note").value;<br/>  if (!name || !price) { alert("Заполните название и цену"); return; }<br/>  items.push({ name, price, img, note });<br/>  render();<br/>  saveToGitHub();<br/>  document.getElementById("name").value = "";<br/>  document.getElementById("price").value = "";<br/>  document.getElementById("img").value = "";<br/>  document.getElementById("note").value = "";<br/>}<br/><br/>// 编辑商品<br/>function edit(i) {<br/>  const it = items[i];<br/>  document.getElementById("name").value = it.name;<br/>  document.getElementById("price").value = it.price;<br/>  document.getElementById("img").value = it.img;<br/>  document.getElementById("note").value = it.note;<br/>  items.splice(i, 1);<br/>}<br/><br/>// 删除商品<br/>function del(i) {<br/>  if (confirm("Удалить этот товар?")) {<br/>    items.splice(i, 1);<br/>    render();<br/>    saveToGitHub();<br/>  }<br/>}<br/></script><br/></body><br/></html>
