<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ли Ян Бадминтон | Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        header p {
            font-size: 1rem;
            color: #718096;
        }
        .login-card {
            background: white;
            max-width: 420px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .login-card h3 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 25px;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15);
        }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #3182ce;
            color: white;
        }
        .btn-primary:hover {
            background: #2b6cb0;
        }
        .btn-secondary {
            background: #718096;
            color: white;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #4a5568;
        }
        .admin-panel {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            display: none;
        }
        .admin-panel h3 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .goods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .good-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }
        .good-card:hover {
            transform: translateY(-5px);
        }
        .good-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .good-info {
            padding: 18px;
        }
        .good-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .good-price {
            font-size: 1.2rem;
            color: #e53e3e;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .good-note {
            font-size: 0.9rem;
            color: #718096;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .good-actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit {
            flex: 1;
            padding: 8px;
            background: #ed8936;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-delete {
            flex: 1;
            padding: 8px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .upload-preview {
            margin-top: 10px;
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ли Ян Бадминтон</h1>
            <p>Профессиональный магазин бадминтонного оборудования</p>
        </header>

        <!-- 登录卡片 -->
        <div class="login-card" id="loginBox">
            <h3>Вход для администратора</h3>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="pwd" placeholder="Введите пароль">
            </div>
            <button class="btn btn-primary" onclick="login()">Войти</button>
        </div>

        <!-- 管理面板 -->
        <div class="admin-panel" id="adminPanel">
            <h3>Добавить новый товар</h3>
            <div class="form-group">
                <label>Название товара</label>
                <input type="text" id="name" placeholder="Например: Волан Nylon Pro">
            </div>
            <div class="form-group">
                <label>Цена</label>
                <input type="text" id="price" placeholder="Например: 1200 ₽">
            </div>
            <div class="form-group">
                <label>Загрузить фото</label>
                <input type="file" id="imgUpload" accept="image/*" onchange="previewImage(event)">
                <img id="preview" class="upload-preview" style="display:none;">
            </div>
            <div class="form-group">
                <label>Примечание</label>
                <textarea id="note" rows="3" placeholder="Описание товара, характеристики"></textarea>
            </div>
            <button class="btn btn-primary" onclick="addItem()">Добавить товар</button>
            <button class="btn btn-secondary" onclick="logout()">Выйти из админки</button>
        </div>

        <!-- 商品列表 -->
        <div class="goods-grid" id="goodsList"></div>
    </div>

    <script>
        const PASSWORD = "Ly52152100";
        const DATA_URL = "https://liyang315.github.io/data.json";
        const SAVE_DATA_URL = "https://api.github.com/repos/liyang315/liyang315.github.io/contents/data.json";
        const UPLOAD_IMG_URL = "https://api.github.com/repos/liyang315/liyang315.github.io/contents/images/";
        let items = [];
        let token = "ghp_Pize7EDxrs8mYm6mC9bgOxyFCC4OUv2B2cDg";

        // 页面加载时读取云端数据
        window.onload = async () => {
            try {
                const res = await fetch(DATA_URL);
                items = await res.json();
                render();
            } catch (e) {
                console.error("Ошибка загрузки данных:", e);
            }
        };

        // 登录功能
        function login() {
            const inputPwd = document.getElementById("pwd").value;
            if (inputPwd === PASSWORD) {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
            } else {
                alert("Неверный пароль!");
            }
        }

        // 退出登录
        function logout() {
            document.getElementById("adminPanel").style.display = "none";
            document.getElementById("loginBox").style.display = "block";
        }

        // 预览上传的图片
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById("preview").src = e.target.result;
                    document.getElementById("preview").style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        }

        // 上传图片到GitHub
        async function uploadImage(file) {
            const fileName = Date.now() + "_" + file.name;
            const reader = new FileReader();
            return new Promise((resolve, reject) => {
                reader.onload = async () => {
                    const base64 = btoa(reader.result);
                    try {
                        const res = await fetch(UPLOAD_IMG_URL + fileName, {
                            method: "PUT",
                            headers: {
                                "Authorization": `token ${token}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                message: "Upload image",
                                content: base64
                            })
                        });
                        if (res.ok) {
                            resolve(`https://raw.githubusercontent.com/liyang315/liyang315.github.io/main/images/${fileName}`);
                        } else {
                            reject("Ошибка загрузки изображения");
                        }
                    } catch (e) {
                        reject(e);
                    }
                };
                reader.readAsBinaryString(file);
            });
        }

        // 渲染商品列表
        function render() {
            const list = document.getElementById("goodsList");
            list.innerHTML = "";
            items.forEach((item, index) => {
                list.innerHTML += `
                    <div class="good-card">
                        <img src="${item.img}" alt="${item.name}" class="good-img" onerror="this.src='https://via.placeholder.com/280x200?text=No+Image'">
                        <div class="good-info">
                            <div class="good-name">${item.name}</div>
                            <div class="good-price">${item.price}</div>
                            <div class="good-note">${item.note || "Нет описания"}</div>
                            <div class="good-actions">
                                <button class="btn-edit" onclick="editItem(${index})">Изменить</button>
                                <button class="btn-delete" onclick="deleteItem(${index})">Удалить</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 保存数据到GitHub云端
        async function saveToGitHub() {
            try {
                // 获取当前文件SHA
                const shaRes = await fetch(SAVE_DATA_URL, {
                    headers: { Authorization: `token ${token}` }
                });
                const shaData = await shaRes.json();
                const sha = shaData.sha;

                // 转成Base64编码
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(items, null, 2))));

                // 提交更新
                const saveRes = await fetch(SAVE_DATA_URL, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Обновить товары",
                        content: content,
                        sha: sha
                    })
                });

                if (saveRes.ok) {
                    alert("✅ Данные успешно сохранены в облако!");
                } else {
                    alert("❌ Ошибка сохранения данных");
                }
            } catch (e) {
                console.error(e);
                alert("❌ Ошибка подключения к облаку");
            }
        }

        // 添加商品
        async function addItem() {
            const name = document.getElementById("name").value.trim();
            const price = document.getElementById("price").value.trim();
            const note = document.getElementById("note").value.trim();
            const fileInput = document.getElementById("imgUpload");
            const file = fileInput.files[0];

            if (!name || !price) {
                alert("⚠️ Заполните название и цену товара!");
                return;
            }

            let imgUrl = "";
            if (file) {
                try {
                    imgUrl = await uploadImage(file);
                } catch (e) {
                    alert("❌ Ошибка загрузки изображения: " + e);
                    return;
                }
            }

            items.push({ name, price, img: imgUrl, note });
            render();
            saveToGitHub();

            // 清空输入框
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
            document.getElementById("imgUpload").value = "";
            document.getElementById("preview").style.display = "none";
            document.getElementById("note").value = "";
        }

        // 编辑商品
        function editItem(index) {
            const item = items[index];
            document.getElementById("name").value = item.name;
            document.getElementById("price").value = item.price;
            document.getElementById("note").value = item.note;
            items.splice(index, 1);
        }

        // 删除商品
        function deleteItem(index) {
            if (confirm("❓ Вы уверены, что хотите удалить этот товар?")) {
                items.splice(index, 1);
                render();
                saveToGitHub();
            }
        }
    </script>
</body>
</html>
