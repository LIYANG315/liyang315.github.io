<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ли Ян Бадминтон | Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        header p {
            font-size: 1rem;
            color: #718096;
        }
        .login-card {
            background: white;
            max-width: 420px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .login-card h3 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 25px;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15);
        }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #3182ce;
            color: white;
        }
        .btn-primary:hover {
            background: #2b6cb0;
        }
        .btn-secondary {
            background: #718096;
            color: white;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #4a5568;
        }
        .admin-panel {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            display: none;
        }
        .admin-panel h3 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .goods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .good-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }
        .good-card:hover {
            transform: translateY(-5px);
        }
        .good-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .good-info {
            padding: 18px;
        }
        .good-name {
            font-size: 1.1rem;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .good-price {
            font-size: 1.2rem;
            color: #e53e3e;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .good-note {
            font-size: 0.9rem;
            color: #718096;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .good-actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit {
            flex: 1;
            padding: 8px;
            background: #ed8936;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .btn-delete {
            flex: 1;
            padding: 8px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Ли Ян Бадминтон</h1>
        <p>Профессиональный магазин бадминтонного оборудования</p>
    </header>

    <div class="login-card" id="loginBox">
        <h3>Вход для администратора</h3>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="pwd" placeholder="Введите пароль">
        </div>
        <button class="btn btn-primary" onclick="login()">Войти</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3>Добавить новый товар</h3>
        <div class="form-group">
            <label>Название товара</label>
            <input type="text" id="name" placeholder="Например: Волан Nylon Pro">
        </div>
        <div class="form-group">
            <label>Цена</label>
            <input type="text" id="price" placeholder="Например: 1200 ₽">
        </div>
        <div class="form-group">
            <label>Ссылка на фото (Gitee)</label>
            <input type="text" id="img" placeholder="https://gitee.com/.../raw/master/...jpg">
        </div>
        <div class="form-group">
            <label>Примечание</label>
            <textarea id="note" rows="3" placeholder="Описание товара"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addItem()">Добавить товар</button>
        <button class="btn btn-secondary" onclick="logout()">Выйти</button>
    </div>

    <div class="goods-grid" id="goodsList"></div>
</div>

<script>
    const PASSWORD = "Ly52152100";

    // 你的 Gitee 私人令牌（已帮你填好）
    const GITEE_TOKEN = "57b610f2335929795625584297c15619";

    // 你的 Gitee 仓库信息
    const REPO_OWNER = "li-yang315";
    const REPO_NAME = "images";
    const FILE_PATH = "data.json";

    // 固定读取地址
    const DATA_URL = `https://gitee.com/api/v5/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?access_token=${GITEE_TOKEN}`;

    let items = [];

    function login() {
        const p = document.getElementById("pwd").value;
        if (p === PASSWORD) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
        } else {
            alert("Неверный пароль!");
        }
    }

    function logout() {
        document.getElementById("adminPanel").style.display = "none";
        document.getElementById("loginBox").style.display = "block";
    }

    function render() {
        const list = document.getElementById("goodsList");
        list.innerHTML = "";
        items.forEach((item, i) => {
            list.innerHTML += `
                <div class="good-card">
                    <img src="${item.img}" class="good-img" onerror="this.src='https://via.placeholder.com/280x200?text=No+Image'">
                    <div class="good-info">
                        <div class="good-name">${item.name}</div>
                        <div class="good-price">${item.price}</div>
                        <div class="good-note">${item.note}</div>
                        <div class="good-actions">
                            <button class="btn-edit" onclick="editItem(${i})">Изменить</button>
                            <button class="btn-delete" onclick="deleteItem(${i})">Удалить</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function loadData() {
        try {
            const r = await fetch(DATA_URL);
            const j = await r.json();
            if (j.content) {
                const raw = atob(j.content);
                items = JSON.parse(raw);
            }
        } catch (e) {
            items = [];
        }
        render();
    }

    async function saveData() {
        try {
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(items, null, 2))));
            const sha = await getCurrentSha();

            const res = await fetch(`https://gitee.com/api/v5/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: "POST",
                body: JSON.stringify({
                    access_token: GITEE_TOKEN,
                    message: "update goods",
                    content: content,
                    sha: sha
                })
            });

            if (res.ok) {
                alert("✅ Данные сохранены в облаке Gitee!");
            }
        } catch (e) {}
    }

    async function getCurrentSha() {
        try {
            const r = await fetch(DATA_URL);
            const j = await r.json();
            return j.sha || "";
        } catch (e) {
            return "";
        }
    }

    function addItem() {
        const name = document.getElementById("name").value.trim();
        const price = document.getElementById("price").value.trim();
        const img = document.getElementById("img").value.trim();
        const note = document.getElementById("note").value.trim();

        if (!name || !price) {
            alert("Заполните название и цену!");
            return;
        }

        items.push({ name, price, img, note });
        render();
        saveData();

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("img").value = "";
        document.getElementById("note").value = "";
    }

    function editItem(i) {
        const item = items[i];
        document.getElementById("name").value
