<!DOCTYPE html><br/><html lang="zh-CN"><br/><head><br/><meta charset="UTF-8"><br/><meta name="viewport" content="width=device-width, initial-scale=1.0"><br/><title>?? 我的羽毛球装备</title><br/><style><br/>*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif}<br/>:root{--bg:#f7f8fa;--card:#fff;--text:#333;--sub:#666;--theme:#007aff;--del:#ff3b30}<br/>.dark{--bg:#1c1c1e;--card:#2c2c2e;--text:#f5f5f7;--sub:#aeaeb2;--theme:#0a84ff;--del:#ff453a}<br/><br/>body{background:var(--bg);color:var(--text);padding:20px 15px;transition:.2s;}<br/>.container{max-width:700px;margin:0 auto;}<br/>.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}<br/>h1{font-size:22px}<br/>.theme-btn{padding:8px 12px;border-radius:12px;border:none;background:var(--card);color:var(--text);cursor:pointer}<br/><br/>.admin-box{background:var(--card);border-radius:16px;padding:15px;text-align:center;margin-bottom:20px}<br/>.admin-box input{width:160px;padding:10px 12px;border:1px solid #ddd;border-radius:10px;outline:none;margin-right:6px}<br/>.admin-box button{padding:10px 14px;background:var(--theme);color:#fff;border:none;border-radius:10px;cursor:pointer}<br/><br/>.add-box,.edit-box{background:var(--card);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;margin-bottom:20px;display:none}<br/>.add-box.show,.edit-box.show{display:flex}<br/>input,textarea,select{padding:12px 14px;border:1px solid #ccc;border-radius:10px;outline:none;font-size:15px;background:var(--card);color:var(--text)}<br/>textarea{min-height:80px;resize:vertical}<br/>button{cursor:pointer}<br/>.add-box button,.edit-box button{padding:12px;background:var(--theme);color:#fff;border:none;border-radius:10px}<br/><br/>.tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px}<br/>.tabs button{padding:8px 14px;border-radius:20px;border:none;background:var(--card);color:var(--text)}<br/>.tabs button.active{background:var(--theme);color:#fff}<br/><br/>.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}<br/>@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}<br/><br/>.card{background:var(--card);border-radius:16px;overflow:hidden;position:relative}<br/>.card-img{width:100%;height:160px;object-fit:cover}<br/>.card-info{padding:14px}<br/>.card-name{font-weight:600;font-size:15px;margin-bottom:4px}<br/>.card-price{color:var(--del);font-size:14px;margin-bottom:6px}<br/>.card-desc{font-size:12px;color:var(--sub);line-height:1.4}<br/><br/>.del-btn,.edit-btn{position:absolute;width:28px;height:28px;border-radius:50%;border:none;color:#fff;display:none}<br/>.del-btn{background:var(--del);top:10px;right:10px}<br/>.edit-btn{background:#5856d6;top:10px;left:10px}<br/>.admin-mode .del-btn,.admin-mode .edit-btn{display:block}<br/><br/>.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}<br/>.modal.show{display:flex}<br/>.modal img{max-width:90%;max-height:85%;border-radius:12px}<br/><br/>.share-btn{margin-top:10px;padding:10px;width:100%;background:var(--theme);color:#fff;border:none;border-radius:12px}<br/></style><br/></head><br/><body><br/><br/><div class="container"><br/>  <div class="head"><br/>    <h1>?? 我的羽毛球装备</h1><br/>    <button class="theme-btn" onclick="toggleDark()"><span class="emoji emoji1f31b"></span> 深色模式</button><br/>  </div><br/><br/>  <div class="admin-box"><br/>    <input type="password" id="pwd" placeholder="管理密码"><br/>    <button onclick="login()">进入管理</button><br/>  </div><br/><br/>  <div class="add-box" id="addBox"><br/>    <input type="file" id="img" accept="image/*"><br/>    <input type="text" id="name" placeholder="名称"><br/>    <input type="text" id="price" placeholder="价格"><br/>    <select id="cate"><br/>      <option value="racket">球拍</option><br/>      <option value="shoes">球鞋</option><br/>      <option value="ball">羽毛球</option><br/>    </select><br/>    <textarea id="desc" placeholder="描述：品牌/型号/成色"></textarea><br/>    <button onclick="addItem()">添加装备</button><br/>  </div><br/><br/>  <div class="edit-box" id="editBox"><br/>    <input type="hidden" id="editId"><br/>    <input type="text" id="editName" placeholder="名称"><br/>    <input type="text" id="editPrice" placeholder="价格"><br/>    <select id="editCate"><br/>      <option value="racket">球拍</option><br/>      <option value="shoes">球鞋</option><br/>      <option value="ball">羽毛球</option><br/>    </select><br/>    <textarea id="editDesc" placeholder="描述"></textarea><br/>    <button onclick="saveEdit()">保存修改</button><br/>  </div><br/><br/>  <div class="tabs"><br/>    <button class="active" onclick="switchTab('all')">全部</button><br/>    <button onclick="switchTab('racket')">球拍</button><br/>    <button onclick="switchTab('shoes')">球鞋</button><br/>    <button onclick="switchTab('ball')">羽毛球</button><br/>  </div><br/><br/>  <button class="share-btn" onclick="sharePage()">?? 分享这个页面给朋友</button><br/>  <div class="grid" id="list"></div><br/></div><br/><br/><div class="modal" id="modal" onclick="closeModal()">< img id="bigImg"></div><br/><br/><script><br/>const PASSWORD = "Ly52152100";<br/>let isAdmin = false;<br/>let currentTab = "all";<br/>let items = JSON.parse(localStorage.getItem("badminton_all")) || [];<br/><br/>// 深色模式<br/>function toggleDark(){document.body.classList.toggle("dark")}<br/><br/>// 登录<br/>function login(){<br/>  if(document.getElementById("pwd").value===PASSWORD){<br/>    isAdmin=true;<br/>    document.body.classList.add("admin-mode");<br/>    document.getElementById("addBox").classList.add("show");<br/>    alert("? 管理模式已开启：可添加、编辑、删除");<br/>    render();<br/>  }else{alert("<span class="emoji emoji2716"></span> 密码错误")}<br/>}<br/><br/>// 添加<br/>function addItem(){<br/>  const f=document.getElementById("img").files[0];<br/>  const n=document.getElementById("name").value.trim();<br/>  const p=document.getElementById("price").value.trim();<br/>  const d=document.getElementById("desc").value.trim();<br/>  const c=document.getElementById("cate").value;<br/>  if(!f||!n){alert("请选图+填名称");return}<br/>  const r=new FileReader();<br/>  r.onload=e=>{<br/>    items.push({id:Date.now(),img:e.target.result,name:n,price:p,desc:d,cate:c});<br/>    localStorage.setItem("badminton_all",JSON.stringify(items));<br/>    document.getElementById("img").value="";<br/>    document.getElementById("name").value="";<br/>    document.getElementById("price").value="";<br/>    document.getElementById("desc").value="";<br/>    render();<br/>  };r.readAsDataURL(f);<br/>}<br/><br/>// 渲染<br/>function render(){<br/>  const list=document.getElementById("list");<br/>  list.innerHTML="";<br/>  const arr=currentTab==="all"?items:items.filter(x=>x.cate===currentTab);<br/>  arr.forEach(item=>{<br/>    const div=document.createElement("div");<br/>    div.className="card";<br/>    div.innerHTML=`<br/>      <button class="edit-btn" onclick="openEdit(${item.id})"><span class="emoji emoji1f4d1"></span>?</button><br/>      <button class="del-btn" onclick="delItem(${item.id})">×</button><br/>      < img src="${item.img}" class="card-img" onclick="openModal('${item.img}')"><br/>      <div class="card-info"><br/>        <div class="card-name">${item.name}</div><br/>        <div class="card-price">${item.price}</div><br/>        <div class="card-desc">${item.desc}</div><br/>      </div>`;<br/>    list.appendChild(div);<br/>  });<br/>}<br/><br/>// 删除<br/>function delItem(id){<br/>  if(!confirm("确定删除？"))return;<br/>  items=items.filter(x=>x.id!==id);<br/>  localStorage.setItem("badminton_all",JSON.stringify(items));<br/>  render();<br/>}<br/><br/>// 编辑<br/>function openEdit(id){<br/>  const item=items.find(x=>x.id===id);<br/>  if(!item)return;<br/>  document.getElementById("editId").value=item.id;<br/>  document.getElementById("editName").value=item.name;<br/>  document.getElementById("editPrice").value=item.price;<br/>  document.getElementById("editCate").value=item.cate;<br/>  document.getElementById("editDesc").value=item.desc;<br/>  document.getElementById("editBox").classList.add("show");<br/>}<br/>function saveEdit(){<br/>  const id=Number(document.getElementById("editId").value);<br/>  const name=document.getElementById("editName").value.trim();<br/>  const price=document.getElementById("editPrice").value.trim();<br/>  const cate=document.getElementById("editCate").value;<br/>  const desc=document.getElementById("editDesc").value.trim();<br/>  if(!name){alert("名称不能为空");return}<br/>  items=items.map(x=>x.id===id?{...x,name,price,cate,desc}:x);<br/>  localStorage.setItem("badminton_all",JSON.stringify(items));<br/>  document.getElementById("editBox").classList.remove("show");<br/>  render();<br/>}<br/><br/>// 分类<br/>function switchTab(tab){<br/>  currentTab=tab;<br/>  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));<br/>  event.target.classList.add("active");<br/>  render();<br/>}<br/><br/>// 放大<br/>function openModal(src){<br/>  document.getElementById("modal").classList.add("show");<br/>  document.getElementById("bigImg").src=src;<br/>}<br/>function closeModal(){<br/>  document.getElementById("modal").classList.remove("show");<br/>}<br/><br/>// 分享<br/>function sharePage(){<br/>  if(navigator.share){<br/>    navigator.share({title:"我的羽毛球装备展示",text:"快来看看我的球拍球鞋",url:window.location.href});<br/>  }else{<br/>    alert("?? 可以复制当前网址发给朋友");<br/>  }<br/>}<br/><br/>render();<br/></script><br/></body><br/></html>
